<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>แบบฟอร์มแก้ไขข้อมูล</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <script src="{{ url_for('static', filename='main.js') }}" defer></script>
</head>
<body>

<div class="menu">
    <a href="/select"><button>หน้าแรก</button></a>
</div>

<div class="topbar">
    <a href="/select" class="btn-back">← เลือกประเภทเอกสาร</a>
    <div class="topbar-right">
        <span style="font-family:THSarabunBold; color:#6f24a6; font-size:15pt;">
            📄 กำลังแก้ไข:
            {% if page_key == 'main' %}หน้าหลัก
            {% elif page_key == 'spec_page1' %}จัดซื้อจัดจ้าง หน้า 1
            {% elif page_key == 'spec_page2' %}จัดซื้อจัดจ้าง หน้า 2
            {% elif page_key == 'report' %}รายงานจัดซื้อจัดจ้าง
            {% endif %}
        </span>
        <button onclick="window.print()">🖨 พิมพ์ PDF</button>
    </div>
</div>

<div class="a4">
    <form id="editForm" onsubmit="handleSubmit(event)">

        <input type="hidden" id="page_key_input" value="{{ page_key }}">

        <img src="{{ url_for('static', filename='logo.jpg') }}" class="logo">

        <!-- header -->
        <div class="row mt10">
            <div class="left">
                <label>จาก&nbsp;&nbsp;&nbsp;</label>
                <input type="text" class="form-input" name="from"
                       value="{{ data.from }}" placeholder="จาก">
            </div>
            <div class="right">
                <label>ถึง&nbsp;&nbsp;&nbsp;</label>
                <input type="text" class="form-input" name="to"
                       value="{{ data.to }}" placeholder="ถึง">
            </div>
        </div>

        <div class="row mt5">
            <div class="left">
                <label>เลขที่&nbsp;&nbsp;&nbsp;</label>
                <input type="text" class="form-input" name="number"
                       value="{{ data.number }}" placeholder="เลขที่">
            </div>
            <div class="right">
                <label>วันที่&nbsp;&nbsp;&nbsp;</label>
                <input type="date" class="form-input" name="date"
                       value="{{ data.date }}">
            </div>
        </div>

        <!-- เรื่อง -->
        <div class="topic mt12">
            <span class="topic-label">เรื่อง</span>
            <textarea class="form-textarea" name="subject"
                      placeholder="เรื่อง">{{ data.subject }}</textarea>
        </div>

        <!-- เรียน -->
        <div class="receiver mt12">
            <label>เรียน&nbsp;&nbsp;&nbsp;</label>
            <input type="text" class="form-input" name="receiver"
                   value="{{ data.receiver }}" placeholder="เรียน">
        </div>

        <!-- section 1 -->
        <div class="section-title mt18">1. ข้อมูล</div>
        <div class="paragraph">
            <textarea class="form-textarea" name="section1">{{ data.section1 }}</textarea>
        </div>

        <!-- section 2 -->
        <div class="section-title mt12">2. ข้อพิจารณา</div>
        <div class="paragraph">
            <textarea class="form-textarea" name="section2">{{ data.section2 }}</textarea>
        </div>

        <div class="paragraph mt8">
            <textarea class="form-textarea" name="closing">{{ data.closing }}</textarea>
        </div>

        <!-- sign -->
        <div class="sign-right">
            <div>
                <label>ลงชื่อ</label>
                <input type="text" class="form-input sign-input"
                       name="signature_from" value="{{ data.signature_from }}">
            </div>
            <div>
                <input type="text" class="form-input sign-input"
                       name="position_from" value="{{ data.position_from }}">
            </div>
        </div>

        <!-- approve -->
        <div class="approve">
            <input type="text" class="form-input" name="approve"
                   value="{{ data.approve }}">
        </div>

        <div class="sign-left">
            <div>
                <label>ลงชื่อ</label>
                <input type="text" class="form-input sign-input"
                       name="signature_approve" value="{{ data.signature_approve }}">
            </div>
            <div>
                <input type="text" class="form-input sign-input"
                       name="position_approve" value="{{ data.position_approve }}">
            </div>
        </div>

        <!-- ปุ่ม -->
        <div class="form-actions mt18">
            <button type="submit" class="btn-save">💾 บันทึกข้อมูล</button>
            <button type="reset" class="btn-reset">🔄 ล้างข้อมูล</button>
        </div>

    </form>
</div>

<script>
// แผนที่ page_key -> URL กลับไปหน้านั้น
const PAGE_REDIRECT = {
    'main':       '/main',
    'spec_page1': '/spec-page-1',
    'spec_page2': '/spec-page-2',
    'report':     '/report'
};

function handleSubmit(event) {
    event.preventDefault();
    const data = Object.fromEntries(new FormData(document.getElementById('editForm')));
    const pageKey = document.getElementById('page_key_input').value;

    const checks = [
        { key: 'from',               label: 'จาก' },
        { key: 'to',                 label: 'ถึง' },
        { key: 'number',             label: 'เลขที่' },
        { key: 'date',               label: 'วันที่' },
        { key: 'subject',            label: 'เรื่อง' },
        { key: 'receiver',           label: 'เรียน' },
        { key: 'section1',           label: '1. ข้อมูล' },
        { key: 'section2',           label: '2. ข้อพิจารณา' },
        { key: 'signature_from',     label: 'ลงชื่อผู้เสนอ' },
        { key: 'position_from',      label: 'ตำแหน่งผู้เสนอ' },
        { key: 'signature_approve',  label: 'ลงชื่อผู้อนุมัติ' },
        { key: 'position_approve',   label: 'ตำแหน่งผู้อนุมัติ' },
    ];

    for (const c of checks) {
        if (!data[c.key] || !data[c.key].trim()) {
            showToast(`กรุณากรอก "${c.label}" ก่อนบันทึก`, 'error');
            const el = document.querySelector(`[name="${c.key}"]`);
            if (el) {
                el.focus();
                el.style.borderColor = '#e53935';
                el.style.boxShadow = '0 0 0 2px rgba(229,57,53,0.25)';
                setTimeout(() => {
                    el.style.borderColor = '';
                    el.style.boxShadow = '';
                }, 2500);
            }
            return;
        }
    }

    data._page_key = pageKey;

    fetch('/api/save-form', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data)
    })
    .then(async r => {
        if (r.status === 401) { window.location.href = '/login'; return; }
        const d = await r.json().catch(() => ({}));
        if (!r.ok) throw new Error(d.message || 'ไม่สามารถบันทึกได้');
        showToast(d.message || 'บันทึกแล้ว ✅');
        const redirectUrl = PAGE_REDIRECT[pageKey] || '/main';
        setTimeout(() => window.location.href = redirectUrl, 900);
    })
    .catch(e => showToast('เกิดข้อผิดพลาด: ' + e.message, 'error'));
}
</script>

</body>
</html>
